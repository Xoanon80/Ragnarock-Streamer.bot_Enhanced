<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
	background: transparent;
	font-family: 'Segoe UI', sans-serif;
	display: flex;
	justify-content: flex-start;
	align-items: flex-end;
	min-height: 100vh;
	padding: 10px;
}
#overlay {
	background: rgba(10, 10, 10, 0.85);
	border: 2px solid #83d8df;
	border-radius: 12px;
	padding: 8px 10px;
	color: white;
	text-align: center;
	opacity: 0;
	transition: opacity 0.8s ease;
	min-width: 300px;
	max-width: 650px;
}
#percent {
	font-size: 2.75em;
	font-weight: 800;
	color: #f0b732;
	line-height: 1;
	transition: color 0.2s;
	font-variant-numeric: tabular-nums;
	font-feature-settings: "tnum";
	display: inline-block;
	text-align: right;
	width: 4ch;
}
#counts {
	font-size: 0.9em;
	color: #bbb;
	font-weight: bold;
	line-height: 1.4;
}
#bar-bg {
	position: relative;
	background: #424242;
	border-radius: 6px;
	height: 8px;
	margin-top: 4px;
	overflow: hidden;
}
#bar-bg::after {
	content: "";
	position: absolute;
	inset: 0;
	pointer-events: none;
	background:
		repeating-linear-gradient(
			90deg,
			transparent 0,
			transparent calc(20% - 1px),
			rgba(44,44,44,0.4) calc(20% - 1px),
			rgba(44,44,44,0.4) 20%
		);
	mask: linear-gradient(
		to right,
		transparent 0%,
		black 3%,
		black 97%,
		transparent 100%
	);
}
#bar-fill {
	position: relative;
	z-index: 2;
	height: 100%;
	border-radius: 6px;
	transition: width 0.3s ease, background 0.5s ease;
	width: 0%;
}
#history {
	display: flex;
	justify-content: center;
	gap: 3px;
	margin-top: 8px;
}
.h-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
.h-perfect { background: #00ff88; }
.h-hit     { background: #f0b732; }
.h-miss    { background: #ff4444; }
.h-empty   { background: #424242; }
#song-row {
	display: flex;
	align-items: center;
	gap: 10px;
	margin-top: 8px;
}
#cover-wrap {
	position: relative;
	width: 68px;
	height: 68px;
	flex-shrink: 0;
	overflow: visible;
	margin-left: -1px;
}
#cover {
	width: 68px;
	height: 68px;
	object-fit: cover;
	border-radius: 6px;
	transition: opacity 0.3s ease;
	display: block;
}
#ranked-star {
	position: absolute;
	top: -7px; right: -7px;
	width: 18px; height: 18px;
	display: none;
	z-index: 2;
}
#ranked-bar {
	position: absolute;
	bottom: 0; left: 0; right: 0;
	background: rgba(240, 183, 50, 0.85);
	border-radius: 0 0 6px 6px;
	font-size: 8px;
	font-weight: 800;
	color: #000;
	text-align: center;
	letter-spacing: 0.1em;
	padding: 1px 0;
	text-transform: uppercase;
	display: none;
}
#song { flex: 1; min-width: 0; line-height: 1.2; text-align: left; }
#artist {
	font-size: 1.55em;
	font-weight: 700;
	white-space: nowrap;
	overflow: hidden;
	text-overflow: clip;
}
#title {
	font-size: 1.45em;
	color: #bbb;
	white-space: nowrap;
	overflow: hidden;
	text-overflow: clip;
}
#mapper {
	font-size: 0.85em;
	color: #83d8df;
	white-space: nowrap;
	overflow: hidden;
	text-overflow: clip;
	margin-top: 2px;
}
#divider {
	height: 1px;
	margin: 14px 0 0 0;
	background: linear-gradient(to right, transparent, rgba(131,216,223,0.25), transparent);
}
#top-line { display: flex; justify-content: center; align-items: center; }
#center-group { display: inline-flex; align-items: center; gap: 9px; }
#label {
	font-size: 0.65em;
	letter-spacing: 0.1em;
	color: #bababa;
	text-transform: uppercase;
	white-space: nowrap;
	opacity: 0.7;
	margin-top: 6px;
	display: flex;
	flex-direction: column;
	align-items: flex-start;
	font-weight: 700;
}
#progress-bg {
	background: #424242;
	border-radius: 6px;
	height: 8px;
	margin: 6px 0 0 0;
	overflow: hidden;
	display: none;
	position: relative;
}
#progress-bg::after {
	content: "";
	position: absolute;
	inset: 0;
	pointer-events: none;
	background:
		repeating-linear-gradient(
			90deg,
			transparent 0,
			transparent calc(20% - 1px),
			rgba(44,44,44,0.4) calc(20% - 1px),
			rgba(44,44,44,0.4) 20%
		);
	mask: linear-gradient(
		to right,
		transparent 0%,
		black 3%,
		black 97%,
		transparent 100%
	);
}
#progress-fill {
	position: relative;
	z-index: 2;
	height: 100%;
	border-radius: 6px;
	background: rgba(155, 213, 223, 0.75);
	width: 0%;
	transition: width 3s ease-out;
}
</style>
</head>
<body>
<div id="overlay">
	<div id="top-line">
		<div id="center-group">
			<div id="percent">0%</div>
			<div id="label">
				<span>Perfect</span>
				<span>Hits</span>
			</div>
		</div>
	</div>
	<div id="counts">0 / 0 Runes</div>
	<div id="bar-bg"><div id="bar-fill"></div></div>
	<div id="history"></div>
	<div id="divider"></div>
	<div id="song-row">
		<div id="cover-wrap">
			<img id="cover" />
			<svg id="ranked-star" viewBox="0 0 18 18">
				<polygon points="9,1 11.5,6.5 17.5,7.2 13,11.5 14.5,17.5 9,14.5 3.5,17.5 5,11.5 0.5,7.2 6.5,6.5"
					fill="#f0b732" stroke="#000" stroke-width="0.8"/>
			</svg>
			<div id="ranked-bar"></div>
		</div>
		<div id="song">
			<div id="artist"></div>
			<div id="title"></div>
			<div id="mapper"></div>
		</div>
	</div>
	<div id="progress-bg">
		<div id="progress-fill"></div>
	</div>
</div>
<script>
	const WS_URL        = "ws://127.0.0.1:8080/";
	const TIMEOUT_MS    = 30000;
	const HISTORY_SLOTS = 35;

	// Lokaler Beat-State
	let localTotalBeats = 0;
	let localPerfect    = 0;
	let localMisses     = 0;
	let localStreak     = 0;
	let localBestStreak = 0;
	let localHistory    = [];
	let lastSongTime    = 0;

	// UI State
	let lastBeatTime      = Date.now();
	let currentSongArtist = "";
	let currentSongTitle  = "";
	let currentCover      = "";
	let lastSongData      = null;
	let songActive        = false;
	let songEnded         = false;
	let ws;

	// Cached DOM
	const overlayEl      = document.getElementById("overlay");
	const percentEl      = document.getElementById("percent");
	const countsEl       = document.getElementById("counts");
	const barFillEl      = document.getElementById("bar-fill");
	const starEl         = document.getElementById("ranked-star");
	const rankedBarEl    = document.getElementById("ranked-bar");
	const coverEl        = document.getElementById("cover");
	const artistEl       = document.getElementById("artist");
	const titleEl        = document.getElementById("title");
	const mapperEl       = document.getElementById("mapper");
	const progressBgEl   = document.getElementById("progress-bg");
	const progressFillEl = document.getElementById("progress-fill");

	// History Dots einmalig erzeugen
	const historyDots = [];
	(function() {
		const historyEl = document.getElementById("history");
		for (let i = 0; i < HISTORY_SLOTS; i++) {
			const d = document.createElement("div");
			d.className = "h-dot h-empty";
			historyEl.appendChild(d);
			historyDots.push(d);
		}
	})();

	function getColor(pct) {
		if (pct === null) return "#f0b732";
		if (pct >= 80) return "#00ff88";
		if (pct >= 60) return "#1fffd4";
		if (pct >= 40) return "#f0b732";
		if (pct >= 20) return "#ff8c00";
		return "#ff4444";
	}

	function getGradient(pct) {
		if (pct === null || pct === 0) return ["#333", "#333"];
		if (pct >= 80) return ["#00cc6a", "#00ff88"];
		if (pct >= 60) return ["#00b8a0", "#1fffd4"];
		if (pct >= 40) return ["#c8932a", "#f0b732"];
		if (pct >= 20) return ["#cc6600", "#ff8c00"];
		return ["#cc2222", "#ff4444"];
	}

	function fitText(el, maxSize, minSize = 12) {
		let size = maxSize;
		el.style.fontSize = size + "px";
		while (el.scrollWidth > el.clientWidth && size > minSize) {
			size--;
			el.style.fontSize = size + "px";
		}
	}

	// Throttle-Timer
	let renderPending = false;

	function scheduleRender() {
		if (renderPending) return;
		renderPending = true;
		requestAnimationFrame(() => {
			renderPercent();
			renderHistory();
			renderCounts(
				lastSongData ? lastSongData.liveComboBlue  || 0 : 0,
				lastSongData ? lastSongData.liveComboYellow || 0 : 0
			);
			renderProgress();
			renderPending = false;
		});
	}

	function renderHistory() {
		const empty = HISTORY_SLOTS - localHistory.length;
		for (let i = 0; i < HISTORY_SLOTS; i++) {
			const cls = i < empty ? "h-dot h-empty" : "h-dot h-" + localHistory[i - empty];
			if (historyDots[i].className !== cls) historyDots[i].className = cls;
		}
	}

	function resetLocalState() {
		localTotalBeats = 0;
		localPerfect    = 0;
		localMisses     = 0;
		localStreak     = 0;
		localBestStreak = 0;
		localHistory    = [];
		lastSongTime    = 0;
	}

	function renderPercent() {
		const pct = localTotalBeats > 0
			? Math.round(localPerfect / localTotalBeats * 100)
			: null;
		percentEl.textContent      = pct !== null ? pct + "%" : "0%";
		percentEl.style.color      = getColor(pct);
		const [g1, g2]             = getGradient(pct);
		barFillEl.style.background = `linear-gradient(90deg, ${g1}, ${g2})`;
		barFillEl.style.width      = (pct !== null ? pct : 0) + "%";
	}

	function renderCounts(blue, yellow) {
		if (lastSongData && lastSongData.scoreAvailable) {
			const d         = lastSongData;
			const delaySign = d.scoreDeltaAvg > 0 ? "+" : "";
			const dist      = parseFloat(d.scoreDist).toLocaleString('de-DE',
				{minimumFractionDigits: 2, maximumFractionDigits: 2});
			countsEl.innerHTML =
				`<span style="color:#00ff88">✓</span> ${d.scoreHit} (${d.scoreHitPct}%) &nbsp; ` +
				`<span style="color:#ff6644">✗</span> ${d.scoreMissed} (${d.scoreMissPct}%) &nbsp; ◎ ${d.scoreTotal}<br>` +
				`📏 ${dist}m &nbsp; ` +
				`<span style="color:#4a9eff;font-size:1.2rem;">●</span> ${d.scoreComboBlue} &nbsp; ` +
				`<span style="color:#f0b732;font-size:1.2rem;">●</span> ${d.scoreComboYellow} &nbsp; ` +
				`⌛${delaySign}${d.scoreDeltaAvg}ms &nbsp; 🔥 ${localBestStreak}`;
		} else {
			countsEl.innerHTML =
				`${localPerfect} / ${localTotalBeats} Runes &nbsp; ` +
				`<span style="color:#4a9eff">●</span> ${blue} &nbsp; ` +
				`<span style="color:#f0b732">●</span> ${yellow} &nbsp; ` +
				`<span style="color:#ff4444">✗ ${localMisses}</span><br>` +
				`🔥 Streak: <span style="color:#00ff88">${localStreak}</span> &nbsp;&middot;&nbsp; ` +
				`Highest: <span style="color:#00ff88">${localBestStreak}</span>`;
		}
	}

	function renderProgress() {
		if (!lastSongData) return;
		const duration = Number(lastSongData.songDuration);
		const hasDur   = !isNaN(duration) && duration > 0 && duration !== 999;
		const songBpm  = Number(lastSongData.songBpm) || 0;
		const hasBpm   = songBpm > 0;

		if (lastSongData.scoreAvailable) {
			if (hasDur && hasBpm) {
				progressBgEl.style.display = "block";
				progressFillEl.style.width = "100%";
			}
		} else if (hasDur && hasBpm) {
			const prgPct = Math.min(lastSongTime / (songBpm / 60) / duration * 100, 100);
			progressBgEl.style.display = "block";
			progressFillEl.style.width = prgPct + "%";
		} else {
			progressBgEl.style.display = "none";
			progressFillEl.style.width = "0%";
		}
	}

	function updateSongInfo(data) {
		lastSongData = data;

		if (!songEnded) {
			songActive = data.active;

			const hasRequiredInfo =
				data.songArtist &&
				data.songTitle;

			if (data.active && hasRequiredInfo) {
				overlayEl.style.opacity = "1";
			}
		}

		// Cover
		const fallbackCover = "logo.webp";
		if (data.coverUrl && data.coverUrl.trim() !== "") {
			currentCover = data.coverUrl;
		} else if (data.active && localTotalBeats === 0) {
			currentCover = fallbackCover;
		}
		if (coverEl.src !== currentCover) {
			coverEl.style.opacity = 0.6;
			coverEl.onload = () => coverEl.style.opacity = 1;
			coverEl.src = currentCover;
		}

		// Ranked
		starEl.style.display      = data.songRanked ? "block" : "none";
		rankedBarEl.style.display = data.songRanked ? "block" : "none";
		rankedBarEl.textContent   = data.songRanked ? "ranked" : "";

		// Artist
		if (data.songArtist && data.songArtist !== currentSongArtist) {
			currentSongArtist    = data.songArtist;
			artistEl.textContent = currentSongArtist;
			fitText(artistEl, 24, 14);
		}

		// Title
		if (data.songTitle && data.songTitle !== currentSongTitle) {
			currentSongTitle    = data.songTitle;
			titleEl.textContent = currentSongTitle;
			fitText(titleEl, 22, 12);
		}

		// Mapper + Meta
		const hasMapper   = data.songMapper && data.songMapper.trim() !== "";
		const duration    = Number(data.songDuration);
		const hasDuration = !isNaN(duration) && duration > 0 && duration !== 999;
		const hasBpm      = data.songBpm && data.songBpm > 0;
		const hasDiffs    = data.songDiffs && data.songDiffs.trim() !== "";

		let mapperText = "";
		if (hasMapper) mapperText = `🗺️ mapped by <b>${data.songMapper}</b>`;
		if (hasDuration) {
			const m = Math.floor(duration / 60);
			const s = Math.floor(duration % 60).toString().padStart(2, "0");
			mapperText += `${mapperText ? " &nbsp;" : ""}<span style="color:#fff;">🕗 ${m}:${s}</span>`;
		}
		if (hasBpm) {
			mapperText += `${mapperText ? " &nbsp;" : ""}<span style="color:#fff;">🥁 ${data.songBpm}</span>`;
		}
		if (hasDiffs) {
			const diffList  = data.songDiffs.split(",").map(d => d.trim()).filter(Boolean);
			const diffLabel = diffList.length === 1 ? "Diff" : "Diffs";
			mapperText += `${mapperText ? " &nbsp;" : ""}<span style="color:#fff;">⚔️ ${diffLabel}: ${diffList.join(", ")}</span>`;
		}
		if (mapperEl.innerHTML !== mapperText) {
			mapperEl.innerHTML = mapperText;
			fitText(mapperEl, 13, 10);
		}

		renderCounts(data.liveComboBlue || 0, data.liveComboYellow || 0);
		renderPercent();
		renderProgress();
	}

	// Timeout
	setInterval(() => {
		if (!songActive && Date.now() - lastBeatTime >= TIMEOUT_MS) {
			overlayEl.style.opacity = "0";
		}
	}, 500);

	function connect() {
		ws = new WebSocket(WS_URL);

		ws.onopen = () => {
			ws.send(JSON.stringify({
				request: "Subscribe",
				id: "ragnarock-sub",
				events: { General: ["Custom"] }
			}));
		};

		ws.onmessage = (event) => {
			try {
				const wrapper = JSON.parse(event.data);
				if (!wrapper.event || wrapper.event.type !== "Custom") return;
				const data = JSON.parse(wrapper.data.data);

				// Song Start → Reset
				if (data.type === "ragnarock-start") {
					songEnded    = false;
					songActive   = true;
					lastBeatTime = Date.now();
					resetLocalState();
					percentEl.textContent      = "0%";
					percentEl.style.color      = "#f0b732";
					barFillEl.style.background = "#333";
					barFillEl.style.width      = "0%";
					progressFillEl.style.transition = "none";
					progressFillEl.style.width = "0%";
					setTimeout(() => {
						progressFillEl.style.transition = "width 3s ease-out";
					}, 50);
					renderHistory();
					renderCounts(0, 0);
					return;
				}

				// Beat Hit
				if (data.type === "ragnarock-beat_hit") {
					lastBeatTime = Date.now();
					localTotalBeats++;
					if (data.isPerfect) {
						localPerfect++;
						localStreak++;
						if (localStreak > localBestStreak) localBestStreak = localStreak;
					} else {
						localStreak = 0;
					}
					localHistory.push(data.isPerfect ? "perfect" : "hit");
					if (localHistory.length > HISTORY_SLOTS) localHistory.shift();
					if (data.time) lastSongTime = Number(data.time);
					scheduleRender();
					return;
				}

				// Beat Miss
				if (data.type === "ragnarock-beat_miss") {
					lastBeatTime = Date.now();
					localTotalBeats++;
					localMisses++;
					localStreak = 0;
					localHistory.push("miss");
					if (localHistory.length > HISTORY_SLOTS) localHistory.shift();
					if (data.time) lastSongTime = Number(data.time);
					scheduleRender();
					return;
				}

				// Song Info (cover, meta, combos, score)
				if (data.type === "ragnarock") {
					updateSongInfo(data);
					return;
				}

				// Combo
				if (data.type === "ragnarock-combo") {
					if (lastSongData) {
						lastSongData.liveComboBlue   = data.liveComboBlue;
						lastSongData.liveComboYellow = data.liveComboYellow;
					}
					renderCounts(data.liveComboBlue || 0, data.liveComboYellow || 0);
					return;
				}

				// Song End
				if (data.type === "ragnarock-end") {
					songEnded    = true;
					songActive   = false;
					lastBeatTime = Date.now();
					if (lastSongData && lastSongData.songBpm &&
						lastSongData.songDuration && lastSongData.songDuration !== 999) {
						progressBgEl.style.display = "block";
						progressFillEl.style.width = "100%";
					}					
					return;
				}

			} catch(e) {}
		};

		ws.onclose = () => setTimeout(connect, 2000);
		ws.onerror = () => {};
	}

	connect();
</script>
</body>
</html>
